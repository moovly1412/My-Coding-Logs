<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kook's Order System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .order-card { max-width: 500px; margin-top: 50px; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card order-card shadow mx-auto p-4">
            <h2 class="text-center mb-4">🛒 สั่งซื้อสินค้า</h2>
            <form action="/save" method="post">
                <div class="mb-3">
                    <label class="form-label">ชื่อคนสั่ง</label>
                    <input type="text" name="customerName" class="form-control" placeholder="ระบุชื่อ-นามสกุล" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">ชื่อสินค้า</label>
                    <input type="text" name="productName" class="form-control" placeholder="ชื่อสินค้าที่ต้องการ" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">รหัสสินค้า</label>
                    <input type="text" name="productCode" class="form-control" placeholder="เช่น PROD-001" required>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">จำนวน</label>
                        <input type="number" name="quantity" class="form-control" value="1" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">ราคาต่อหน่วย</label>
                        <input type="number" step="0.01" name="price" class="form-control" placeholder="0.00" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-3">ยืนยันการสั่งซื้อ</button>
            </form>
            <hr class="my-5">
<h3 class="mb-3 text-center">📋 รายการสั่งซื้อทั้งหมด</h3>
<div class="table-responsive">
    <table class="table table-hover table-bordered bg-white shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>ชื่อคนสั่ง</th>
                <th>สินค้า</th>
                <th>รหัส</th>
                <th>จำนวน</th>
                <th>ราคา</th>
                <th>จัดการ</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="ord : ${allOrders}">
                <td th:text="${ord.id}"></td>
                <td th:text="${ord.customerName}"></td>
                <td th:text="${ord.productName}"></td>
                <td th:text="${ord.productCode}"></td>
                <td th:text="${ord.quantity}"></td>
                <td th:text="${ord.price}"></td>
                <td>
                <a th:href="@{'/delete/' + ${ord.id}}" class="btn btn-danger btn-sm" onclick="return confirm('แน่ใจนะว่าจะลบรายการนี้?')">
                <i class="fas fa-trash-alt"></i> ลบ </a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
        </div>
    </div>
</body>
</html>
